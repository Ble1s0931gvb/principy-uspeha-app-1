<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Настройки аккаунта</title>
<style>
:root{--bg:#05060c;--surface:#0b0d18;--surface2:#131627;--border:#232a42;--text:#e9ecf5;--text2:#838cab;--accent:#c3cbe0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.container{max-width:480px;margin:0 auto}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:14px;margin-bottom:24px;cursor:pointer}
.back:hover{color:var(--text)}
h1{font-size:24px;font-weight:800;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:16px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:#3a3f55}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:4px}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-logout{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);margin-top:16px}
.msg{padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.msg-ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:#4ade80}
.msg-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.user-info{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.user-avatar{width:56px;height:56px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--bg)}
.user-details h3{font-size:16px;font-weight:700}
.user-details p{font-size:13px;color:var(--text2)}
.danger-zone{border-color:rgba(239,68,68,.2)}
.danger-zone h2{color:#ef4444}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--bg);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <a class="back" onclick="history.back()">← Назад</a>
  <h1>⚙️ Настройки аккаунта</h1>

  <div class="card">
    <div class="user-info">
      <div class="user-avatar" id="avatar">?</div>
      <div class="user-details">
        <h3 id="displayName">Загрузка...</h3>
        <p id="displayEmail">...</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Имя / Никнейм</h2>
    <div class="field">
      <label>Ваше имя</label>
      <input type="text" id="newName" placeholder="Введите имя">
    </div>
    <div id="nameMsg" class="msg"></div>
    <button class="btn btn-primary" onclick="updateName()" id="nameBtn">Сохранить имя</button>
  </div>

  <div class="card">
    <h2>Сменить пароль</h2>
    <div class="field">
      <label>Текущий пароль</label>
      <input type="password" id="currentPassword" placeholder="••••••••">
    </div>
    <div class="field">
      <label>Новый пароль</label>
      <input type="password" id="newPassword" placeholder="Минимум 6 символов">
    </div>
    <div class="field">
      <label>Повторите новый пароль</label>
      <input type="password" id="confirmPassword" placeholder="••••••••">
    </div>
    <div id="passMsg" class="msg"></div>
    <button class="btn btn-primary" onclick="updatePassword()" id="passBtn">Изменить пароль</button>
  </div>

  <div class="card">
    <h2>Сменить email</h2>
    <div class="field">
      <label>Текущий пароль (для подтверждения)</label>
      <input type="password" id="emailPassword" placeholder="••••••••">
    </div>
    <div class="field">
      <label>Новый email</label>
      <input type="email" id="newEmail" placeholder="new@email.com">
    </div>
    <div id="emailMsg" class="msg"></div>
    <button class="btn btn-primary" onclick="updateEmail()" id="emailBtn">Изменить email</button>
  </div>

  <div class="card danger-zone">
    <h2>⚠️ Опасная зона</h2>
    <button class="btn btn-danger" onclick="if(confirm('Удалить аккаунт? Это нельзя отменить!'))deleteAccount()">Удалить аккаунт</button>
  </div>

  <button class="btn btn-logout" onclick="logout()">🚪 Выйти из аккаунта</button>
</div>

<script src="theme.js"></script>
<script>
if(!localStorage.getItem('nbk_user')||!JSON.parse(localStorage.getItem('nbk_user')).loggedIn){window.location.href='auth.html';}
</script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, updatePassword, reauthenticateWithCredential, EmailAuthProvider, verifyBeforeUpdateEmail, deleteUser, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyB3ucC6A3pf_0nPPShY0R0X90AhCwwJdrA",
  authDomain: "nbkkakus.firebaseapp.com",
  projectId: "nbkkakus",
  storageBucket: "nbkkakus.firebasestorage.app",
  messagingSenderId: "69897608942",
  appId: "1:69897608942:web:97abc0a2f8e9196c981dff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = {};
let userDocId = null;

function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  el.style.display = 'block';
}
function hideMsg(id) { document.getElementById(id).style.display = 'none'; }
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) { btn.dataset.text = btn.textContent; btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true; }
  else { btn.textContent = btn.dataset.text; btn.disabled = false; }
}

async function init() {
  if (!localUser || !localUser.email) return;
  const email = localUser.email;

  document.getElementById('displayEmail').textContent = email;
  document.getElementById('newEmail').placeholder = email;
  document.getElementById('avatar').textContent = email.charAt(0).toUpperCase();
  document.getElementById('displayName').textContent = email.split('@')[0];

  try {
    const q = query(collection(db, 'users'), where('email', '==', email));
    const snap = await getDocs(q);
    if (!snap.empty) {
      userDocId = snap.docs[0].id;
      userData = snap.docs[0].data();
      const name = userData.nickname || email.split('@')[0];
      document.getElementById('displayName').textContent = name;
      document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
      document.getElementById('newName').value = userData.nickname || '';
    }
  } catch(e) {}

  try {
    await auth.authStateReady();
    currentUser = auth.currentUser;
  } catch(e) {}
}

init();

window.updateName = async function() {
  hideMsg('nameMsg');
  const name = document.getElementById('newName').value.trim();
  if (!name) { showMsg('nameMsg', 'Введите имя', false); return; }
  setLoading('nameBtn', true);
  try {
    const email = localUser ? localUser.email : (currentUser ? currentUser.email : '');
    const q = query(collection(db, 'users'), where('email', '==', email));
    const snap = await getDocs(q);
    if (!snap.empty) {
      await setDoc(doc(db, 'users', snap.docs[0].id), { nickname: name }, { merge: true });
    }
    userData.nickname = name;
    document.getElementById('displayName').textContent = name;
    document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
    showMsg('nameMsg', 'Имя обновлено!', true);
  } catch (e) { showMsg('nameMsg', 'Ошибка: ' + e.message, false); }
  setLoading('nameBtn', false);
};

window.updatePassword = async function() {
  hideMsg('passMsg');
  if (!currentUser) { showMsg('passMsg', 'Войдите заново для смены пароля', false); return; }
  const current = document.getElementById('currentPassword').value;
  const newPass = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  if (!current || !newPass || !confirm) { showMsg('passMsg', 'Заполните все поля', false); return; }
  if (newPass.length < 6) { showMsg('passMsg', 'Пароль минимум 6 символов', false); return; }
  if (newPass !== confirm) { showMsg('passMsg', 'Пароли не совпадают', false); return; }
  setLoading('passBtn', true);
  try {
    const credential = EmailAuthProvider.credential(currentUser.email, current);
    await reauthenticateWithCredential(currentUser, credential);
    await updatePassword(currentUser, newPass);
    showMsg('passMsg', 'Пароль изменён!', true);
    document.getElementById('currentPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
  } catch (e) {
    if (e.code === 'auth/wrong-password') showMsg('passMsg', 'Неверный текущий пароль', false);
    else showMsg('passMsg', 'Ошибка: ' + e.message, false);
  }
  setLoading('passBtn', false);
};

window.updateEmail = async function() {
  hideMsg('emailMsg');
  if (!currentUser) { showMsg('emailMsg', 'Войдите заново для смены email', false); return; }
  const password = document.getElementById('emailPassword').value;
  const newEmail = document.getElementById('newEmail').value.trim();
  if (!password || !newEmail) { showMsg('emailMsg', 'Заполните все поля', false); return; }
  setLoading('emailBtn', true);
  try {
    const credential = EmailAuthProvider.credential(currentUser.email, password);
    await reauthenticateWithCredential(currentUser, credential);
    await verifyBeforeUpdateEmail(currentUser, newEmail);
    showMsg('emailMsg', 'Письмо с подтверждением отправлено на ' + newEmail + '! Проверьте почту.', true);
    document.getElementById('emailPassword').value = '';
    document.getElementById('newEmail').value = '';
  } catch (e) {
    if (e.code === 'auth/wrong-password') showMsg('emailMsg', 'Неверный пароль', false);
    else if (e.code === 'auth/email-already-in-use') showMsg('emailMsg', 'Этот email уже используется', false);
    else showMsg('emailMsg', 'Ошибка: ' + e.message, false);
  }
  setLoading('emailBtn', false);
};

window.deleteAccount = async function() {
  if (!currentUser) { alert('Войдите заново для удаления аккаунта'); return; }
  try {
    if (userDocId) await setDoc(doc(db, 'users', userDocId), { deleted: true }, { merge: true });
    await deleteUser(currentUser);
    localStorage.removeItem('nbk_user');
    window.location.href = 'auth.html';
  } catch (e) { alert('Ошибка: ' + e.message); }
};

window.logout = async function() {
  try { await signOut(auth); } catch(e) {}
  localStorage.removeItem('nbk_user');
  window.location.href = 'auth.html';
};
</script>
</body>
</html>
