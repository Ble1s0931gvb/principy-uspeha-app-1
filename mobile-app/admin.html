<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка — Токены</title>
<script src="theme.js"></script>
<style>
:root{--bg:#05060c;--surface:#0b0d18;--surface2:#131627;--border:#232a42;--text:#e9ecf5;--text2:#838cab;--accent:#c3cbe0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:20px}
.container{max-width:800px;margin:0 auto}
h1{font-size:24px;margin-bottom:20px}
.row{display:flex;gap:10px;margin-bottom:20px}
input{padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;flex:1}
button{padding:12px 24px;border:none;border-radius:8px;background:var(--accent);color:var(--bg);font-weight:700;cursor:pointer;font-size:14px}
button:hover{opacity:.9}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat .num{font-size:32px;font-weight:800;margin-bottom:4px}
.stat .label{font-size:12px;color:var(--text2)}
.tokens-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;max-height:400px;overflow-y:auto}
.token-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-family:monospace;font-size:13px}
.token-item:last-child{border-bottom:none}
.used{color:#ef4444}
.free{color:#4ade80}
.msg{padding:12px;border-radius:8px;margin-bottom:16px;display:none}
.msg-ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:#4ade80}
.msg-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}
</style>
</head>
<body>
<div class="container">
  <h1>🔑 Управление токенами</h1>
  <div id="msg" class="msg"></div>

  <div class="stats">
    <div class="stat"><div class="num" id="total">0</div><div class="label">Всего</div></div>
    <div class="stat"><div class="num" id="freeCount">0</div><div class="label">Свободных</div></div>
    <div class="stat"><div class="num" id="usedCount">0</div><div class="label">Использовано</div></div>
  </div>

  <div class="row">
    <input type="number" id="count" placeholder="Количество токенов" value="100">
    <button onclick="generate()">Сгенерировать</button>
  </div>

  <div class="tokens-list" id="tokensList">Загрузка...</div>

  <div style="margin-top:20px;display:flex;gap:10px">
    <a href="account.html" style="flex:1;padding:12px;background:#0b0d18;border:1px solid #232a42;border-radius:10px;color:#e9ecf5;text-decoration:none;text-align:center;font-size:14px;font-weight:600">⚙️ Аккаунт</a>
    <a href="#" onclick="localStorage.removeItem('nbk_user');window.location.href='auth.html'" style="flex:1;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;color:#ef4444;text-decoration:none;text-align:center;font-size:14px;font-weight:600">🚪 Выйти</a>
  </div>
</div>

<script>
if(!localStorage.getItem('nbk_user')||!JSON.parse(localStorage.getItem('nbk_user')).loggedIn){window.location.href='auth.html';}
</script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, getDocs, addDoc, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyB3ucC6A3pf_0nPPShY0R0X90AhCwwJdrA",
  authDomain: "nbkkakus.firebaseapp.com",
  projectId: "nbkkakus",
  storageBucket: "nbkkakus.firebasestorage.app",
  messagingSenderId: "69897608942",
  appId: "1:69897608942:web:97abc0a2f8e9196c981dff"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function genToken() {
  const hex = () => Math.random().toString(16).substr(2,8).toUpperCase();
  return 'NBK-' + hex() + '-' + hex();
}

function showMsg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function loadTokens() {
  const snapshot = await getDocs(collection(db, 'tokens'));
  const tokens = [];
  snapshot.forEach(doc => tokens.push({ id: doc.id, ...doc.data() }));

  document.getElementById('total').textContent = tokens.length;
  document.getElementById('freeCount').textContent = tokens.filter(t => !t.used).length;
  document.getElementById('usedCount').textContent = tokens.filter(t => t.used).length;

  const list = document.getElementById('tokensList');
  if (tokens.length === 0) {
    list.innerHTML = '<p style="color:#838cab">Нет токенов</p>';
    return;
  }
  list.innerHTML = tokens.map(t =>
    `<div class="token-item"><span class="${t.used ? 'used' : 'free'}">${t.id}</span><span style="font-size:11px;color:#838cab">${t.used ? '🔴 ' + (t.usedBy || '?') : '🟢 свободен'}</span></div>`
  ).join('');
}

window.generate = async function() {
  const count = parseInt(document.getElementById('count').value) || 100;
  showMsg(`Генерируем ${count} токенов...`, true);

  for (let i = 0; i < count; i++) {
    const token = genToken();
    await setDoc(doc(db, 'tokens', token), {
      token: token,
      used: false,
      usedBy: null,
      createdAt: new Date().toISOString()
    });
  }

  showMsg(`✓ ${count} токенов добавлено!`, true);
  loadTokens();
};

loadTokens();
</script>
</body>
</html>
